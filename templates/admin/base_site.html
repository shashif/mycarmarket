{% extends "admin/base.html" %}
{% load static %}

{% block title %}
{{ title }} | MyCarMarket Admin
{% endblock %}

{% block branding %}
<div style="display:flex; align-items:center; gap:14px;">
    <img
        src="{% static 'images/logo.png' %}"
        alt="MyCarMarket"
        style="height:45px; width:auto; object-fit:contain;"
    >

    <div>
        <h1 style="margin:0; font-size:22px; font-weight:800; color:white;">
            MyCarMarket Admin
        </h1>

        <div style="font-size:12px; color:#bfdbfe; margin-top:3px;">
            Version v1.6.1
        </div>
    </div>
</div>
{% endblock %}

{% block nav-global %}
<a
    href="{% url 'admin:vehicles_moderationdashboard_changelist' %}"
    class="moderation-menu-link"
>
    ★ Moderation Center
</a>
{% endblock %}

{% block extrastyle %}
{{ block.super }}

<style>
    #header{
        background:#111827;
        color:white;
        min-height:70px;
    }

    #branding h1{
        color:white;
    }

    #user-tools{
        color:#dbeafe;
    }

    #user-tools a{
        color:#bfdbfe;
    }

    #nav-global{
        display:flex;
        align-items:center;
        margin-left:24px;
    }

    .moderation-menu-link{
        display:inline-flex;
        align-items:center;
        justify-content:center;
        padding:10px 16px;
        background:#dc2626;
        color:#ffffff !important;
        border-radius:8px;
        font-size:13px;
        font-weight:800;
        text-decoration:none;
        white-space:nowrap;
        transition:background 0.2s ease;
    }

    .moderation-menu-link:hover{
        background:#b91c1c;
        color:#ffffff !important;
    }

    .module h2,
    .module caption,
    .inline-group h2{
        background:#2563eb;
    }

    div.breadcrumbs{
        background:#1f2937;
        color:#dbeafe;
    }

    div.breadcrumbs a{
        color:white;
    }

    a:link,
    a:visited{
        color:#2563eb;
    }

    .button,
    input[type=submit],
    input[type=button],
    .submit-row input,
    a.button{
        background:#2563eb;
        border-radius:8px;
        border:none;
        font-weight:700;
    }

    .button:hover,
    input[type=submit]:hover,
    input[type=button]:hover,
    .submit-row input:hover,
    a.button:hover{
        background:#1d4ed8;
    }

    .button.default,
    input[type=submit].default,
    .submit-row input.default{
        background:#111827;
    }

    @media (max-width: 767px){
        #header{
            height:auto;
            padding:12px 16px;
        }

        #nav-global{
            width:100%;
            margin:12px 0 0;
        }

        .moderation-menu-link{
            width:100%;
            box-sizing:border-box;
        }
    }
</style>
{% endblock %}
