<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MyCarMarket</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f6f8;
            margin:0;
            padding:0;
        }

        .container{
            max-width:500px;
            margin:60px auto;
            background:#fff;
            padding:30px;
            border-radius:12px;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            color:#111827;
        }

        form p{
            margin-bottom:15px;
        }

        label{
            display:block;
            margin-bottom:5px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #d1d5db;
            border-radius:8px;
            box-sizing:border-box;
        }

        .btn{
            width:100%;
            padding:14px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
        }

        .btn:hover{
            background:#1d4ed8;
        }

        .login-link{
            text-align:center;
            margin-top:20px;
        }

        .login-link a{
            text-decoration:none;
            color:#2563eb;
            font-weight:bold;
        }

        .messages{
            margin-bottom:20px;
        }

        .message{
            background:#dcfce7;
            color:#166534;
            padding:10px;
            border-radius:6px;
            margin-bottom:10px;
        }

        ul.errorlist{
            color:red;
            list-style:none;
            padding-left:0;
        }
    </style>
</head>
<body>
    //nav bar
{% include 'includes/navbar.html' %}
<div class="container">

    <h1>Create Account</h1>

    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <div class="message">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn">
            Register
        </button>
    </form>

    <div class="login-link">
        Already have an account?
        <a href="{% url 'login' %}">
            Login Here
        </a>
    </div>

</div>

</body>
</html>
