{% extends "base.html" %}
{% load static %}

{% block title %}
Verify Email - MyCarMarket Australia
{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}?v=167">
{% endblock %}

{% block content %}
<section class="auth-page auth-center">
    <div class="auth-card auth-text-center">

        <div class="auth-icon">📧</div>

        <h1 class="auth-title">Check Your Email</h1>

        <p class="auth-subtitle">
            We sent you a verification link.
            Please verify your email before logging in.
        </p>

        <a href="{% url 'login' %}" class="auth-btn auth-btn-small">
            Back to Login
        </a>

    </div>
</section>
{% endblock %}
