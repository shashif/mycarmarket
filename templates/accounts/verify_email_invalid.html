{% extends "base.html" %}
{% load static %}

{% block title %}
Invalid Verification Link - MyCarMarket Australia
{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}?v=167">
{% endblock %}

{% block content %}
<section class="auth-page auth-center">
    <div class="auth-card auth-text-center">

        <div class="auth-icon">⚠️</div>

        <h1 class="auth-title">Invalid Link</h1>

        <p class="auth-subtitle">
            This verification link is invalid or already used.
        </p>

        <a href="{% url 'register' %}" class="auth-btn auth-btn-small">
            Create Account Again
        </a>

    </div>
</section>
{% endblock %}
