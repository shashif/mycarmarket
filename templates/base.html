<!-- =========================================
MyCarMarket
Version: v1.11.7
File: templates/base.html
Description: Master Base Template
             Added Extra Meta Block for Social Sharing
========================================= -->

{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="theme-color"
        content="#111827"
    >

    <title>
        {% block title %}
            MyCarMarket Australia
        {% endblock %}
    </title>

    <!-- ==========================================
    SECTION 01 START
    Page Specific SEO / Social Meta
    ========================================== -->

    {% block extra_meta %}
    {% endblock %}

    <!-- ==========================================
    SECTION 01 END
    Page Specific SEO / Social Meta
    ========================================== -->


    <!-- ==========================================
    SECTION 02 START
    Global CSS
    ========================================== -->

    <link
        rel="stylesheet"
        href="{% static 'css/style.css' %}?v=178"
    >

    <!-- ==========================================
    SECTION 02 END
    Global CSS
    ========================================== -->


    <!-- ==========================================
    SECTION 03 START
    Extra CSS
    ========================================== -->

    {% block extra_css %}
    {% endblock %}

    <!-- ==========================================
    SECTION 03 END
    Extra CSS
    ========================================== -->


    <!-- ==========================================
    SECTION 04 START
    Favicon
    ========================================== -->

    <link
        rel="apple-touch-icon"
        sizes="180x180"
        href="{% static 'favicon/apple-touch-icon.png' %}"
    >

    <link
        rel="shortcut icon"
        href="{% static 'favicon/favicon.ico' %}"
    >

    <link
        rel="icon"
        type="image/png"
        sizes="32x32"
        href="{% static 'favicon/favicon-32x32.png' %}"
    >

    <link
        rel="icon"
        type="image/png"
        sizes="16x16"
        href="{% static 'favicon/favicon-16x16.png' %}"
    >

    <link
        rel="manifest"
        href="{% static 'favicon/site.webmanifest' %}"
    >

    <!-- ==========================================
    SECTION 04 END
    Favicon
    ========================================== -->


    <!-- ==========================================
    SECTION 05 START
    Preconnect
    ========================================== -->

    <link
        rel="preconnect"
        href="https://www.googletagmanager.com"
    >

    <!-- ==========================================
    SECTION 05 END
    Preconnect
    ========================================== -->


    <!-- ==========================================
    SECTION 06 START
    Google Analytics
    ========================================== -->

    <script
        async
        src="https://www.googletagmanager.com/gtag/js?id=G-FGGQZ4WXDT"
    ></script>

    <script>
        window.dataLayer = window.dataLayer || [];

        function gtag(){
            dataLayer.push(arguments);
        }

        gtag('js', new Date());

        gtag('config', 'G-FGGQZ4WXDT');
    </script>

    <!-- ==========================================
    SECTION 06 END
    Google Analytics
    ========================================== -->

</head>

<body>

    <!-- ==========================================
    SECTION 07 START
    Page Content
    ========================================== -->

    {% block content %}
    {% endblock %}

    <!-- ==========================================
    SECTION 07 END
    Page Content
    ========================================== -->


    <!-- ==========================================
    SECTION 08 START
    Global UX Tools
    ========================================== -->

    <div id="global-loader">
        <div class="loader-circle"></div>
    </div>

    <div id="toast"></div>

    <button
        id="scrollTopBtn"
        type="button"
        aria-label="Scroll to top"
    >
        ⬆
    </button>

    <!-- ==========================================
    SECTION 08 END
    Global UX Tools
    ========================================== -->


    <!-- ==========================================
    SECTION 09 START
    Global JavaScript
    ========================================== -->

    <script src="{% static 'js/loading.js' %}"></script>
    <script src="{% static 'js/toast.js' %}"></script>
    <script src="{% static 'js/scroll_top.js' %}"></script>
    <script src="{% static 'js/favourite.js' %}"></script>

    <!-- ==========================================
    SECTION 09 END
    Global JavaScript
    ========================================== -->


    <!-- ==========================================
    SECTION 10 START
    Extra JavaScript
    ========================================== -->

    {% block extra_js %}
    {% endblock %}

    <!-- ==========================================
    SECTION 10 END
    Extra JavaScript
    ========================================== -->

</body>

</html>
