<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login - MyCarMarket</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f6f8;
            margin:0;
            padding:0;
        }

        .container{
            max-width:500px;
            margin:60px auto;
            background:#fff;
            padding:30px;
            border-radius:12px;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            color:#111827;
        }

        label{
            font-weight:bold;
            display:block;
            margin-bottom:6px;
            color:#374151;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:1px solid #d1d5db;
            border-radius:8px;
            box-sizing:border-box;
            font-size:15px;
        }

        .btn{
            width:100%;
            padding:14px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
        }

        .btn:hover{
            background:#1d4ed8;
        }

        .register-link{
            text-align:center;
            margin-top:20px;
        }

        .register-link a{
            color:#2563eb;
            text-decoration:none;
            font-weight:bold;
        }

        ul.errorlist{
            color:red;
            list-style:none;
            padding-left:0;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Login</h1>

    <form method="POST" autocomplete="on">
        {% csrf_token %}

        {% if form.errors %}
            <ul class="errorlist">
                <li>Invalid username or password. Please try again.</li>
            </ul>
        {% endif %}

        <label for="id_username">Username</label>
        <input
            type="text"
            name="username"
            id="id_username"
            autocomplete="username"
            required
        >

        <label for="id_password">Password</label>
        <input
            type="password"
            name="password"
            id="id_password"
            autocomplete="current-password"
            required
        >

        <button type="submit" class="btn">
            Login
        </button>
    </form>

    <div class="register-link">
        Don't have an account?
        <a href="{% url 'register' %}">
            Register Here
        </a>
    </div>

</div>

</body>
</html>
