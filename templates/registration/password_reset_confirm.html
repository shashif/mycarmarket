{% extends "base.html" %}

{% block title %}
Set New Password - MyCarMarket Australia
{% endblock %}

{% block content %}
<section style="min-height:700px;background:#eef2f7;display:flex;align-items:center;justify-content:center;padding:60px 16px;">
    <div style="width:100%;max-width:520px;background:white;border-radius:28px;padding:42px;box-shadow:0 25px 70px rgba(15,23,42,0.25);">
        <h1 style="text-align:center;">Set New Password</h1>

        {% if validlink %}
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" style="width:100%;height:56px;border:none;border-radius:12px;background:#2563eb;color:white;font-weight:900;">
                    Change Password
                </button>
            </form>
        {% else %}
            <p>This password reset link is invalid or expired.</p>
            <a href="{% url 'password_reset' %}">Request a new link</a>
        {% endif %}
    </div>
</section>
{% endblock %}
