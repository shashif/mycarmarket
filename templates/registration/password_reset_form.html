{% extends "base.html" %}
{% load static %}

{% block title %}
Reset Password - MyCarMarket Australia
{% endblock %}

{% block content %}

<section style="min-height:700px;background:#eef2f7;display:flex;align-items:center;justify-content:center;padding:60px 16px;">

    <div style="width:100%;max-width:520px;background:white;border-radius:28px;padding:42px;box-shadow:0 25px 70px rgba(15,23,42,0.25);">

        <a href="{% url 'login' %}" style="color:#2563eb;text-decoration:none;font-weight:800;">
            ← Back to Login
        </a>

        <h1 style="text-align:center;color:#111827;margin-top:25px;">
            Reset Password
        </h1>

        <p style="text-align:center;color:#6b7280;">
            Enter your email address and we’ll send you a password reset link.
        </p>

        <form method="POST">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" style="width:100%;height:56px;border:none;border-radius:12px;background:#2563eb;color:white;font-size:17px;font-weight:900;cursor:pointer;">
                Send Reset Link
            </button>
        </form>

    </div>

</section>

{% endblock %}
