{% extends "base.html" %}
{% load static %}

{% block title %}
Password Changed - MyCarMarket Australia
{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}?v=167">
{% endblock %}

{% block content %}
<section class="auth-page auth-center">
    <div class="auth-card auth-text-center">

        <div class="auth-icon">✅</div>

        <h1 class="auth-title">Password Changed</h1>

        <p class="auth-subtitle">
            Your password has been updated successfully.
        </p>

        <a href="{% url 'home' %}" class="auth-btn auth-btn-small">
            Back to Home
        </a>

    </div>
</section>
{% endblock %}
