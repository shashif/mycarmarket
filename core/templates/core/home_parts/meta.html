
<!-- =========================================
MyCarMarket
Version: v1.10.2
File: core/templates/core/home_parts/meta.html
Description:
Homepage SEO Meta Tags
Brand SEO + Social Sharing Improvements
========================================= -->


<!-- =========================================
SECTION 01 START
Basic SEO Meta Tags
========================================= -->

<meta
    name="description"
    content="MyCarMarket Australia, also known as My Car Market Australia, helps Australians buy, sell and rent cars. Find affordable used cars, dealer vehicles, private listings and rental cars across Australia."
>

<meta
    name="keywords"
    content="MyCarMarket Australia, My Car Market Australia, cars for sale Australia, used cars Australia, sell cars Australia, car rentals Australia"
>

<meta
    name="author"
    content="MyCarMarket Australia"
>

<meta
    name="robots"
    content="index, follow, max-image-preview:large"
>

<link
    rel="canonical"
    href="https://www.mycarmarket.com.au/"
>

<!-- =========================================
SECTION 01 END
Basic SEO Meta Tags
========================================= -->

<!-- --------------------------------------------- -->


<!-- =========================================
SECTION 02 START
Open Graph
========================================= -->

<meta
    property="og:type"
    content="website"
>

<meta
    property="og:title"
    content="MyCarMarket Australia | My Car Market Australia - Buy, Sell & Rent Cars"
>

<meta
    property="og:description"
    content="Buy, sell and rent cars across Australia. Find affordable used cars, dealer vehicles, private listings and rental cars on MyCarMarket Australia."
>

<meta
    property="og:url"
    content="https://www.mycarmarket.com.au/"
>

<meta
    property="og:site_name"
    content="MyCarMarket Australia"
>

<meta
    property="og:locale"
    content="en_AU"
>

{% if settings and settings.hero_image %}
<meta
    property="og:image"
    content="{{ request.scheme }}://{{ request.get_host }}{{ settings.hero_image.url }}"
>

<meta
    property="og:image:secure_url"
    content="{{ request.scheme }}://{{ request.get_host }}{{ settings.hero_image.url }}"
>

<meta
    property="og:image:alt"
    content="MyCarMarket Australia - Buy, sell and rent cars"
>
{% endif %}

<!-- =========================================
SECTION 02 END
Open Graph
========================================= -->

<!-- --------------------------------------------- -->


<!-- =========================================
SECTION 03 START
Twitter / X Meta Tags
========================================= -->

<meta
    name="twitter:card"
    content="summary_large_image"
>

<meta
    name="twitter:title"
    content="MyCarMarket Australia | My Car Market Australia - Buy, Sell & Rent Cars"
>

<meta
    name="twitter:description"
    content="Find affordable used cars, dealer vehicles, private listings and rental cars across Australia on MyCarMarket Australia."
>

{% if settings and settings.hero_image %}
<meta
    name="twitter:image"
    content="{{ request.scheme }}://{{ request.get_host }}{{ settings.hero_image.url }}"
>

<meta
    name="twitter:image:alt"
    content="MyCarMarket Australia - Buy, sell and rent cars"
>
{% endif %}

<!-- =========================================
SECTION 03 END
Twitter / X Meta Tags
========================================= -->

<!-- --------------------------------------------- -->


<!-- =========================================

Application and Browser Meta

    name="application-name"
    content="MyCarMarket Australia"

<meta
