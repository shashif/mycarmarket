

<!-- =========================================
SEO META TAGS START
Google Search Engine Optimization
========================================= -->

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"

>

<meta
name="description"
content="Buy, Sell & Rent Cars Across Australia. Browse used cars, dealer vehicles and private seller listings on MyCarMarket Australia."

>

<meta
name="keywords"
content="cars for sale Australia, used cars Australia, buy car Australia, sell car Australia, dealer cars, private seller cars, Melbourne cars, Sydney cars, Brisbane cars, MyCarMarket"

>

<meta
name="author"
content="MyCarMarket Australia"

>

<meta
name="robots"
content="index, follow"

>

<link
    rel="canonical"
    href="https://www.mycarmarket.com.au/"
>

<!-- =========================================
SEO META TAGS END
========================================= -->

<!-- =========================================
OPEN GRAPH START
Facebook, LinkedIn, Messenger
========================================= -->

<meta property="og:type" content="website">

<meta
property="og:title"
content="MyCarMarket Australia - Buy, Sell & Rent Cars"

>

<meta
property="og:description"
content="Australia's marketplace to buy, sell and rent cars from private sellers and dealers."

>

<meta
property="og:url"
content="https://www.mycarmarket.com.au/"

>

{% if settings and settings.hero_image %}
<meta
property="og:image"
content="{{ settings.hero_image.url }}"

>

{% endif %}

<meta
property="og:site_name"
content="MyCarMarket Australia"

>

<!-- =========================================
OPEN GRAPH END
========================================= -->

<!-- =========================================
TWITTER / X SHARE START
========================================= -->

<meta
name="twitter:card"
content="summary_large_image"

>

<meta
name="twitter:title"
content="MyCarMarket Australia - Buy, Sell & Rent Cars"

>

<meta
name="twitter:description"
content="Australia's marketplace to buy, sell and rent cars."

>

{% if settings and settings.hero_image %}
<meta
name="twitter:image"
content="{{ settings.hero_image.url }}"

>

{% endif %}

<!-- =========================================
TWITTER / X SHARE END
========================================= -->
