<!DOCTYPE html>
<html>
<head>
    <title>Delete Listing - MyCarMarket</title>
</head>
<body>
    //nav bar
{% include 'includes/navbar.html' %}
<h1>Delete Listing</h1>

<p>
    Are you sure you want to delete:
</p>

<h2>{{ car.title }}</h2>

<p>
    Price: ${{ car.price }}
</p>

<form method="POST">
    {% csrf_token %}

    <button type="submit">
        Yes, Delete
    </button>

    <a href="{% url 'my_listings' %}">
        Cancel
    </a>
</form>

</body>
</html>
