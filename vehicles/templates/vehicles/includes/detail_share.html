 <div class="share-box">
                <h3>📢 Share This Car</h3>
                <p class="share-subtitle">Help this listing reach more buyers.</p>

                <div class="share-buttons">

                    <a target="_blank"
                       href="https://www.facebook.com/sharer/sharer.php?u={{ share_url }}"
                       class="share-btn facebook">
                        📘 Facebook
                    </a>

                    <a target="_blank"
                       href="https://api.whatsapp.com/send?text={{ share_text }} {{ share_url }}"
                       class="share-btn whatsapp">
                        💬 WhatsApp
                    </a>

                    <a target="_blank"
                       href="https://www.facebook.com/dialog/send?link={{ share_url }}&redirect_uri={{ share_url }}"
                       class="share-btn messenger">
                        📩 Messenger
                    </a>

                    <a target="_blank"
                       href="https://twitter.com/intent/tweet?url={{ share_url }}&text={{ share_text }}"
                       class="share-btn twitter">
                        𝕏 Twitter
                    </a>

                    <button type="button"
                            class="share-btn copy-link-btn"
                            onclick="copyCarLink()">
                        🔗 Copy Link
                    </button>

                </div>

                <div id="copyMessage" class="copy-message">
                    Link copied successfully ✅
                </div>
            </div>
